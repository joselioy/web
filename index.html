<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Imprenta Lioy - AR</title>

    <!-- Evitamos el error 404 de favicon agregando un icono genérico por código -->
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <!-- 1. Librerías obligatorias con HTTPS Seguro NATIVO -->
    <script src="https://cloudflare.com"></script>
    <script src="https://github.io"></script>

    <style>
      .arjs-loader {
        height: 100%; width: 100%; position: absolute; top: 0; left: 0;
        background-color: rgba(0, 0, 0, 0.8); z-index: 9999;
        display: flex; justify-content: center; align-items: center;
      }
      .arjs-loader div { text-align: center; color: white; font-family: sans-serif; font-size: 1.25em; }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <!-- Pantalla de carga inicial -->
    <div class="arjs-loader" id="loadingScreen">
      <div>Cargando Realidad Aumentada, por favor espere...</div>
    </div>

    <!-- Escena Principal de Realidad Aumentada -->
    <a-scene 
      vr-mode-ui="enabled: false;" 
      renderer="logarithmicDepthBuffer: true; precision: medium;" 
      embedded
      arjs="trackingMethod: nft; sourceType: webcam; debugUIEnabled: false;">

      <a-assets>
        <!-- IMPORTANTE: El video DEBE llamarse 'erero.mp4' y estar dentro de tu carpeta 'assets' -->
        <video 
          id="vid3" 
          src="assets/erero.mp4" 
          preload="auto" 
          loop 
          crossorigin 
          playsinline 
          webkit-playsinline 
          muted>
        </video>
      </a-assets>

      <!-- Rastreador de imagen NFT -->
      <a-nft 
        type="nft" 
        url="assets/descriptors/exe_marker" 
        smooth="true" 
        smoothCount="10" 
        smoothTolerance="0.01" 
        smoothThreshold="5" 
        id="markerA"
        registerevents>
        
        <!-- Plano de video escalado -->
        <a-video 
          src="#vid3" 
          width="150" 
          height="150" 
          position="0 0 0" 
          rotation="-90 0 0">
        </a-video>
      </a-nft>

      <!-- Cámara obligatoria -->
      
    </a-scene>

    <script>
      // Ocultar pantalla gris cuando cargue el marcador NFT de forma exitosa
      window.addEventListener('arjs-nft-loaded', function () {
          document.getElementById('loadingScreen').style.display = 'none';
      });

      // Registrar lógica para reproducir o pausar el video
      AFRAME.registerComponent('registerevents', {
        init: function () {
          var marker = this.el;
          var video = document.querySelector("#vid3");
          
          marker.addEventListener('markerFound', function() { 
            video.play(); 
          });
          
          marker.addEventListener('markerLost', function() { 
            video.pause(); 
          });
        }
      });
    </script>
  </body>
</html>
