<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Imprenta Lioy - AR Hiro</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <!-- Librerías oficiales ultra-estables -->
    <script src="https://aframe.io"></script>
    <script src="https://github.io"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">

    <!-- Cambiamos el tipo de rastreo a 'pattern' (mucho más rápido y liviano) -->
    <a-scene 
      vr-mode-ui="enabled: false;" 
      renderer="logarithmicDepthBuffer: true; precision: medium;" 
      embedded
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

      <a-assets>
        <!-- Tu archivo de video en la carpeta assets -->
        <video 
          id="vid3" 
          src="assets/erero.mp4" 
          preload="auto" 
          loop 
          crossorigin 
          playsinline 
          webkit-playsinline 
          muted>
        </video>
      </a-assets>

      <!-- Usamos el marcador predeterminado HIRO -->
      <a-marker preset="hiro" id="markerA" registerevents>
        
        <!-- El video ahora se escala a tamaño normal (1x1) para encajar en el marcador -->
        <a-video 
          src="#vid3" 
          width="2" 
          height="2" 
          position="0 0 0" 
          rotation="-90 0 0">
        </a-video>
      </a-marker>

      <!-- Cámara obligatoria -->
      
    </a-scene>

    <script>
      // Controlador para dar play/pausa al video al enfocar el marcador
      if (typeof AFRAME !== 'undefined') {
        AFRAME.registerComponent('registerevents', {
          init: function () {
            var marker = this.el;
            var video = document.querySelector("#vid3");
            
            marker.addEventListener('markerFound', function() { 
              video.play(); 
            });
            
            marker.addEventListener('markerLost', function() { 
              video.pause(); 
            });
          }
        });
      }
    </script>
  </body>
</html>
